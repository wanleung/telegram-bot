services:
  bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - bot-data:/app/data
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - MIMO_API_KEY=${MIMO_API_KEY}
    # Allow the bot to reach a locally running Ollama instance.
    # On Linux, use host network so localhost resolves to the host.
    # On Mac/Windows, set ollama.base_url to http://host.docker.internal:11434
    network_mode: host

  comfyui:
    build:
      context: ../comfyUI
    restart: unless-stopped
    command: ["python3", "scripts/mcp_server.py"]
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MIMO_API_KEY=${MIMO_API_KEY}
    ports:
      - "18002:8000"
    volumes:
      - ../comfyUI/lora:/workspace/lora:ro

  playwright-mcp:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    restart: unless-stopped
    command: >
      bash -c "npx --yes @playwright/mcp@latest --headless --port 8937 --host 0.0.0.0"
    ports:
      - "8937:8937"

volumes:
  bot-data:
