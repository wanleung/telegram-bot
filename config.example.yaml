telegram:
  token: "${TELEGRAM_TOKEN}"   # export TELEGRAM_TOKEN=your-token-here

# Chat backend: ollama (default), vllm, litellm_proxy, or mimo
backend: ollama

ollama:
  base_url: "http://localhost:11434"
  default_model: "llama3.2"
  timeout: 300  # seconds to wait for a response (increase for large/slow models)

# vLLM backend (local or network). Required when backend: vllm or rag.embed_backend: vllm
# vllm:
#   base_url: "http://localhost:8000"      # or http://192.168.1.50:8000
#   default_model: "meta-llama/Llama-3.2-3B-Instruct"
#   timeout: 300

# Mimo cloud API backend (OpenAI-compatible). Required when backend: mimo
# backend: mimo
# mimo:
#   base_url: "https://api.mimo.ai/v1"    # replace with your actual endpoint
#   api_key: "${MIMO_API_KEY}"
#   default_model: "mimo-v2.5-pro"
#   timeout: 300

history:
  max_messages: 50
  db_path: "data/history.db"

rag:
  enabled: false
  embed_backend: ollama   # ollama or vllm (defaults to main backend if not set)
  embed_model: "nomic-embed-text"
  db_path: "data/chroma"
  top_k: 4
  similarity_threshold: 0.5

mcp_servers:
  filesystem:
    type: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/home/user"]
    enabled: false

  web_search:
    type: sse
    url: "http://localhost:8080/sse"
    enabled: false

  custom_http:
    type: http
    url: "http://localhost:9000/mcp"
    enabled: false

  comfyui:
    type: http
    url: "http://localhost:18002/mcp"
    enabled: true
